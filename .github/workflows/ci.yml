# CI only — no deploy.
# Local, before you push: ensure DATABASE_URL* in .env, then: pnpm ci:prisma && pnpm ci:quality
# (GitHub runs Prisma + the same quality gate in one job; see env + services below.)
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gorola_test?schema=public
  DATABASE_URL_TEST: postgresql://postgres:postgres@postgres:5432/gorola_test?schema=public
  DIRECT_URL: postgresql://postgres:postgres@postgres:5432/gorola_test?schema=public
  REDIS_URL: redis://redis:6379
  NODE_ENV: test

jobs:
  ci:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gorola_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version comes from root package.json "packageManager" (pnpm@10.0.0) — do not set `version` here

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma — generate
        run: pnpm --filter @gorola/api exec prisma generate

      - name: Prisma — migrate (test DB)
        run: pnpm --filter @gorola/api exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
