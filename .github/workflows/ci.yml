# CI only — no deploy.
# Local, before you push: ensure DATABASE_URL* in .env, then: pnpm ci:prisma && pnpm ci:quality
# (GitHub runs Prisma + the same quality gate in one job; see env + services below.)
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Use 127.0.0.1 + published ports. Job steps run on the VM host, not in the same Docker network
# namespace as the `postgres` service hostname, so @postgres:5432 often returns P1001.
env:
  DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/gorola_test?schema=public&sslmode=disable"
  DATABASE_URL_TEST: "postgresql://postgres:postgres@127.0.0.1:5432/gorola_test?schema=public&sslmode=disable"
  DIRECT_URL: "postgresql://postgres:postgres@127.0.0.1:5432/gorola_test?schema=public&sslmode=disable"
  REDIS_URL: "redis://127.0.0.1:6379"
  NODE_ENV: test

jobs:
  ci:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gorola_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version comes from root package.json "packageManager" (pnpm@10.0.0) — do not set `version` here

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @gorola/shared "types" point at dist/ — must exist before api/app typecheck
      - name: Build @gorola/shared
        run: pnpm --filter @gorola/shared build

      - name: Wait for service ports (host-published)
        shell: bash
        run: |
          set -e
          for i in $(seq 1 30); do
            (echo >/dev/tcp/127.0.0.1/5432) 2>/dev/null && { echo "Postgres ready on 127.0.0.1:5432"; break; }
            echo "Waiting for 127.0.0.1:5432... ($i/30)"
            sleep 1
            if [ "$i" -eq 30 ]; then echo "Postgres not ready"; exit 1; fi
          done
          for i in $(seq 1 15); do
            (echo >/dev/tcp/127.0.0.1/6379) 2>/dev/null && { echo "Redis ready on 127.0.0.1:6379"; break; }
            echo "Waiting for 127.0.0.1:6379... ($i/15)"
            sleep 1
            if [ "$i" -eq 15 ]; then echo "Redis not ready"; exit 1; fi
          done

      - name: Prisma — generate
        run: pnpm --filter @gorola/api exec prisma generate

      - name: Prisma — migrate (test DB)
        run: pnpm --filter @gorola/api exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
